<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Blue</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Styrene+A:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1c1c1c;
      --surface: #2a2a2a;
      --surface2: #323232;
      --border: #3d3d3d;
      --accent: #cc9b7a;
      --text: #ececec;
      --text-dim: #8a8a8a;
      --text-mid: #b4b4b4;
      --user-bg: #2a2a2a;
      --sans: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --radius: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100dvh;
      display: flex;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #161616;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      padding: 16px 12px;
      gap: 4px;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #1c1c1c;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .sidebar-label {
      font-size: 11px;
      color: var(--text-dim);
      padding: 4px 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 8px;
    }

    .new-chat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-mid);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      width: 100%;
      text-align: left;
    }

    .new-chat-btn:hover { background: var(--surface); color: var(--text); }

    .model-picker {
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .model-picker label {
      font-size: 11px;
      color: var(--text-dim);
      display: block;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .model-select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-mid);
      font-family: var(--sans);
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      outline: none;
    }
    .model-select:focus { border-color: var(--accent); }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    .dot.online { background: #4caf6e; }

    .status-text {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 40px 0 20px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message-wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .message {
      margin-bottom: 32px;
      animation: fadeUp 0.18s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .avatar {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .avatar.user { background: #4a4a4a; color: var(--text); }
    .avatar.assistant { background: var(--accent); color: #1c1c1c; }

    .role-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .message-body {
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      padding-left: 36px;
    }

    /* Markdown styles */
    .message-body p { margin-bottom: 12px; }
    .message-body p:last-child { margin-bottom: 0; }

    .message-body h1 { font-size: 20px; font-weight: 600; margin: 20px 0 10px; color: var(--text); }
    .message-body h2 { font-size: 17px; font-weight: 600; margin: 18px 0 8px; color: var(--text); }
    .message-body h3 { font-size: 15px; font-weight: 600; margin: 14px 0 6px; color: var(--text); }

    .message-body ul, .message-body ol {
      padding-left: 22px;
      margin-bottom: 12px;
    }
    .message-body li { margin-bottom: 5px; line-height: 1.65; }
    .message-body li:last-child { margin-bottom: 0; }

    .message-body code {
      font-family: ui-monospace, "SF Mono", monospace;
      font-size: 13px;
      background: #252525;
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
      color: #e8b89a;
    }

    .message-body pre {
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      overflow-x: auto;
      margin: 14px 0;
      position: relative;
    }

    .pre-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .lang-label {
      font-size: 11px;
      color: var(--text-dim);
      font-family: ui-monospace, monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .copy-btn {
      font-size: 11px;
      color: var(--text-dim);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .copy-btn:hover { color: var(--text); }

    .message-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: #ccc;
      font-size: 13px;
      line-height: 1.6;
    }

    .message-body strong { font-weight: 600; color: #fff; }
    .message-body em { font-style: italic; }

    .message-body blockquote {
      border-left: 3px solid var(--accent);
      padding: 8px 14px;
      margin: 12px 0;
      color: var(--text-mid);
      background: #222;
      border-radius: 0 6px 6px 0;
    }

    .message-body table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 14px;
    }
    .message-body th, .message-body td {
      padding: 8px 12px;
      text-align: left;
      border: 1px solid var(--border);
    }
    .message-body th {
      background: #222;
      font-weight: 500;
      color: var(--text);
    }
    .message-body td { color: var(--text-mid); }

    .message-body a { color: var(--accent); text-decoration: none; }
    .message-body a:hover { text-decoration: underline; }

    .message-body hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    /* Thinking */
    .thinking-body {
      padding-left: 36px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      font-size: 14px;
    }

    .thinking-dots span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
      opacity: 0.5;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Empty state */
    .empty-state {
      max-width: 720px;
      margin: 40px auto 0;
      padding: 0 24px;
    }

    .empty-state h2 {
      font-size: 26px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .empty-state p {
      color: var(--text-dim);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 13px;
      color: var(--text-mid);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      text-align: left;
      line-height: 1.5;
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface2);
    }

    /* Input area */
    .input-area {
      padding: 12px 24px 20px;
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 720px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within { border-color: #555; }

    .endpoint-row {
      padding: 8px 14px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .endpoint-label {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #endpoint {
      flex: 1;
      background: none;
      border: none;
      color: var(--text-dim);
      font-family: ui-monospace, monospace;
      font-size: 11px;
      outline: none;
      min-width: 0;
    }

    #endpoint:focus { color: var(--text-mid); }

    .textarea-row {
      display: flex;
      align-items: flex-end;
      padding: 10px 14px;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      resize: none;
      outline: none;
      min-height: 28px;
      max-height: 200px;
      line-height: 1.6;
    }

    #input::placeholder { color: var(--text-dim); }

    #send {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send:hover { opacity: 0.85; }
    #send:disabled { opacity: 0.25; cursor: not-allowed; }

    .hint {
      max-width: 720px;
      margin: 6px auto 0;
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
    }

    .error-bubble {
      background: #2d1a1a;
      border: 1px solid #5a2a2a;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #f08080;
    }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .suggestions { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">B</div>
    <span class="logo-text">Agent Blue</span>
  </div>

  <button class="new-chat-btn" onclick="newChat()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New chat
  </button>

  <div class="model-picker">
    <label>Model</label>
    <select class="model-select" id="modelSelect">
      <option value="qwen/qwen3.5-9b">qwen/qwen3.5-9b</option>
      <option value="google/gemma-4-12b-qat">google/gemma-4-12b-qat</option>
      <option value="google/gemma-4-e4b">google/gemma-4-e4b</option>
    </select>
    <div class="status-row">
      <div class="dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Connecting...</span>
    </div>
  </div>
</aside>

<div class="main">
  <div id="messages">
    <div class="message-wrap">
      <div class="empty-state" id="emptyState">
        <h2>What can I help with?</h2>
        <p>Connected to your local LM Studio. Web search and scraping are available.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="fillInput(this)">Search for the latest AI news today and summarize the top story</button>
          <button class="suggestion" onclick="fillInput(this)">Scrape and summarize https://news.ycombinator.com</button>
          <button class="suggestion" onclick="fillInput(this)">What's happening in the stock market today?</button>
          <button class="suggestion" onclick="fillInput(this)">Find recent research on large language models</button>
        </div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <div class="endpoint-row">
        <span class="endpoint-label">Proxy</span>
        <input type="text" id="endpoint" value="https://flakily-vaseline-catchy.ngrok-free.dev" spellcheck="false" placeholder="https://your-ngrok-url.ngrok-free.app">
      </div>
      <div class="textarea-row">
        <textarea id="input" placeholder="Message Bonaparte AI..." rows="1"></textarea>
        <button id="send" onclick="sendMessage()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1c1c1c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
    <p class="hint">Agent Blue can make mistakes. Verify important information.</p>
  </div>
</div>

<script>
  // Minimal markdown parser - handles real formatting correctly
  function parseMarkdown(text) {
    const lines = text.split('\n');
    let html = '';
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];

      // Fenced code block
      if (line.startsWith('```')) {
        const lang = line.slice(3).trim();
        let code = '';
        i++;
        while (i < lines.length && !lines[i].startsWith('```')) {
          code += lines[i] + '\n';
          i++;
        }
        const escaped = code.trimEnd()
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const copyId = 'code-' + Math.random().toString(36).slice(2);
        html += `<pre><div class="pre-header"><span class="lang-label">${lang || 'code'}</span><button class="copy-btn" onclick="copyCode('${copyId}')">Copy</button></div><code id="${copyId}">${escaped}</code></pre>`;
        i++;
        continue;
      }

      // Headings
      const h3 = line.match(/^### (.+)/);
      const h2 = line.match(/^## (.+)/);
      const h1 = line.match(/^# (.+)/);
      if (h3) { html += `<h3>${inlineFormat(h3[1])}</h3>`; i++; continue; }
      if (h2) { html += `<h2>${inlineFormat(h2[1])}</h2>`; i++; continue; }
      if (h1) { html += `<h1>${inlineFormat(h1[1])}</h1>`; i++; continue; }

      // HR
      if (line.match(/^---+$/)) { html += '<hr>'; i++; continue; }

      // Blockquote
      if (line.startsWith('> ')) {
        let bq = '';
        while (i < lines.length && lines[i].startsWith('> ')) {
          bq += inlineFormat(lines[i].slice(2)) + ' ';
          i++;
        }
        html += `<blockquote>${bq.trim()}</blockquote>`;
        continue;
      }

      // Unordered list
      if (line.match(/^[-*] /)) {
        html += '<ul>';
        while (i < lines.length && lines[i].match(/^[-*] /)) {
          html += `<li>${inlineFormat(lines[i].slice(2))}</li>`;
          i++;
        }
        html += '</ul>';
        continue;
      }

      // Ordered list
      if (line.match(/^\d+\. /)) {
        html += '<ol>';
        while (i < lines.length && lines[i].match(/^\d+\. /)) {
          html += `<li>${inlineFormat(lines[i].replace(/^\d+\. /, ''))}</li>`;
          i++;
        }
        html += '</ol>';
        continue;
      }

      // Table
      if (line.includes('|') && lines[i+1] && lines[i+1].match(/^\|?[\s\-|]+\|?$/)) {
        const headers = line.split('|').filter(c => c.trim()).map(c => `<th>${inlineFormat(c.trim())}</th>`).join('');
        html += `<table><tr>${headers}</tr>`;
        i += 2; // skip separator
        while (i < lines.length && lines[i].includes('|')) {
          const cells = lines[i].split('|').filter(c => c.trim()).map(c => `<td>${inlineFormat(c.trim())}</td>`).join('');
          html += `<tr>${cells}</tr>`;
          i++;
        }
        html += '</table>';
        continue;
      }

      // Empty line - paragraph break
      if (line.trim() === '') { i++; continue; }

      // Paragraph
      let para = '';
      while (i < lines.length && lines[i].trim() !== '' && !lines[i].match(/^[#>\-*`]/) && !lines[i].match(/^\d+\. /)) {
        para += lines[i] + ' ';
        i++;
      }
      if (para.trim()) html += `<p>${inlineFormat(para.trim())}</p>`;
    }

    return html;
  }

  function inlineFormat(text) {
    return text
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  }

  function copyCode(id) {
    const el = document.getElementById(id);
    if (el) navigator.clipboard.writeText(el.textContent);
  }

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const endpointEl = document.getElementById('endpoint');
  const modelSelect = document.getElementById('modelSelect');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  let history = [];
  let isLoading = false;

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function fillInput(btn) { inputEl.value = btn.textContent.trim(); inputEl.focus(); }

  function newChat() {
    history = [];
    messagesEl.innerHTML = `<div class="message-wrap"><div class="empty-state" id="emptyState">
      <h2>What can I help with?</h2>
      <p>Connected to your local LM Studio. Web search and scraping are available.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="fillInput(this)">Search for the latest AI news today and summarize the top story</button>
        <button class="suggestion" onclick="fillInput(this)">Scrape and summarize https://news.ycombinator.com</button>
        <button class="suggestion" onclick="fillInput(this)">What's happening in the stock market today?</button>
        <button class="suggestion" onclick="fillInput(this)">Find recent research on large language models</button>
      </div></div></div>`;
  }

  function getEndpoint() { return endpointEl.value.trim().replace(/\/$/, ''); }

  async function checkStatus() {
    try {
      const res = await fetch(getEndpoint() + '/v1/models', {
        headers: { 'ngrok-skip-browser-warning': '1' }
      });
      if (res.ok) {
        const data = await res.json();
        statusDot.classList.add('online');
        statusText.textContent = 'Connected';
        if (data.data?.length) {
          modelSelect.innerHTML = data.data
            .filter(m => !m.id.includes('embed'))
            .map(m => `<option value="${m.id}">${m.id}</option>`)
            .join('');
        }
      } else throw new Error();
    } catch {
      statusDot.classList.remove('online');
      statusText.textContent = 'Offline';
    }
  }

  endpointEl.addEventListener('change', checkStatus);
  checkStatus();

  function createMessage(role) {
    document.getElementById('emptyState')?.remove();
    const wrap = document.createElement('div');
    wrap.className = 'message-wrap';
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    const header = document.createElement('div');
    header.className = 'message-header';
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'user' ? 'Y' : 'B';
    const label = document.createElement('div');
    label.className = 'role-label';
    label.textContent = role === 'user' ? 'You' : 'Bonaparte AI';
    header.appendChild(avatar);
    header.appendChild(label);
    const body = document.createElement('div');
    body.className = 'message-body';
    msg.appendChild(header);
    msg.appendChild(body);
    wrap.appendChild(msg);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return body;
  }

  function showThinking() {
    document.getElementById('emptyState')?.remove();
    const wrap = document.createElement('div');
    wrap.className = 'message-wrap';
    wrap.id = 'thinking';
    wrap.innerHTML = `<div class="message assistant">
      <div class="message-header">
        <div class="avatar assistant">B</div>
        <div class="role-label">Bonaparte AI</div>
      </div>
      <div class="thinking-body">
        <span>Thinking</span>
        <div class="thinking-dots"><span></span><span></span><span></span></div>
      </div>
    </div>`;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    const userBody = createMessage('user');
    userBody.textContent = text;
    history.push({ role: 'user', content: text });
    showThinking();

    try {
      const res = await fetch(getEndpoint() + '/v1/chat/completions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
        body: JSON.stringify({ model: modelSelect.value, messages: history })
      });
      const data = await res.json();
      document.getElementById('thinking')?.remove();

      if (data.error) {
        const body = createMessage('assistant');
        body.innerHTML = `<div class="error-bubble">Error: ${data.error.message || JSON.stringify(data.error)}</div>`;
      } else {
        const reply = data.choices[0].message.content;
        history.push({ role: 'assistant', content: reply });
        const body = createMessage('assistant');
        body.innerHTML = parseMarkdown(reply);
      }
    } catch (err) {
      document.getElementById('thinking')?.remove();
      const body = createMessage('assistant');
      body.innerHTML = `<div class="error-bubble">Could not reach proxy at <code>${getEndpoint()}</code>. Make sure ngrok and uvicorn are running.</div>`;
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>
</body>
</html>
