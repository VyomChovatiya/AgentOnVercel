<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bonaparte AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #7fff6e;
      --accent-dim: rgba(127,255,110,0.12);
      --text: #e8e8e8;
      --text-dim: #666;
      --text-mid: #999;
      --user-bg: #1e1e1e;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--text-mid);
      font-family: var(--mono);
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    .dot.online { background: var(--accent); }

    .model-select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-mid);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      outline: none;
    }
    .model-select:focus { border-color: var(--accent); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message-wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .message {
      margin-bottom: 28px;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .message.user .message-meta { color: var(--accent); opacity: 0.7; }

    .message-body {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
    }

    .message.user .message-body {
      background: var(--user-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
    }

    .message.assistant .message-body {
      border-left: 2px solid var(--accent);
      padding-left: 16px;
    }

    .message-body h1, .message-body h2, .message-body h3 {
      color: var(--text);
      margin: 16px 0 8px;
      font-size: 15px;
      font-weight: 500;
    }

    .message-body p { margin-bottom: 10px; }
    .message-body ul, .message-body ol { padding-left: 20px; margin-bottom: 10px; }
    .message-body li { margin-bottom: 4px; }

    .message-body code {
      font-family: var(--mono);
      font-size: 13px;
      background: #1a1a1a;
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 3px;
      color: var(--accent);
    }

    .message-body pre {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
    }

    .message-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: #ccc;
    }

    .message-body strong { color: #fff; font-weight: 500; }

    .thinking {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-dim);
      font-family: var(--mono);
      font-size: 12px;
      padding-left: 18px;
      border-left: 2px solid var(--border);
    }

    .thinking-dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    .empty-state {
      max-width: 760px;
      margin: 60px auto 0;
      padding: 0 24px;
    }

    .empty-state h2 {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .empty-state p {
      color: var(--text-dim);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .suggestion {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-mid);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      text-align: left;
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .input-area {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
      flex-shrink: 0;
    }

    .input-wrap {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: var(--accent); }
    #input::placeholder { color: var(--text-dim); }

    #send {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      width: 48px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }

    #send:hover { opacity: 0.85; }
    #send:disabled { opacity: 0.3; cursor: not-allowed; }

    #send svg { color: #000; }

    .config-bar {
      max-width: 760px;
      margin: 0 auto 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .config-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    #endpoint {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-mid);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 10px;
      outline: none;
    }

    #endpoint:focus { border-color: var(--accent); color: var(--text); }

    .error-msg {
      color: #ff6b6b;
      font-family: var(--mono);
      font-size: 12px;
      border-left: 2px solid #ff6b6b;
      padding-left: 12px;
    }

    @media (max-width: 600px) {
      .suggestions { grid-template-columns: 1fr; }
      header { padding: 12px 16px; }
      .input-area { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">Bonaparte AI</span>
  <div style="display:flex;align-items:center;gap:14px">
    <select class="model-select" id="modelSelect">
      <option value="qwen/qwen3.5-9b">qwen/qwen3.5-9b</option>
      <option value="google/gemma-4-12b-qat">google/gemma-4-12b-qat</option>
      <option value="google/gemma-4-e4b">google/gemma-4-e4b</option>
    </select>
    <div class="status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">connecting</span>
    </div>
  </div>
</header>

<div id="messages">
  <div class="message-wrap">
    <div class="empty-state" id="emptyState">
      <h2>What do you need?</h2>
      <p>Connected to your local LM Studio via proxy. Web search and scraping are available.</p>
      <div class="suggestions">
        <button class="suggestion" onclick="fillInput(this)">Search for the latest AI news today</button>
        <button class="suggestion" onclick="fillInput(this)">Scrape and summarize https://news.ycombinator.com</button>
        <button class="suggestion" onclick="fillInput(this)">What's happening in the stock market today?</button>
        <button class="suggestion" onclick="fillInput(this)">Find recent research papers on LLMs</button>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="config-bar">
    <span class="config-label">proxy</span>
    <input type="text" id="endpoint" value="https://flakily-vaseline-catchy.ngrok-free.dev" placeholder="https://your-ngrok-url.ngrok-free.app" spellcheck="false">
  </div>
  <div class="input-wrap">
    <textarea id="input" placeholder="Ask anything..." rows="1"></textarea>
    <button id="send" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const emptyState = document.getElementById('emptyState');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const endpointEl = document.getElementById('endpoint');
  const modelSelect = document.getElementById('modelSelect');

  let history = [];
  let isLoading = false;

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function fillInput(btn) {
    inputEl.value = btn.textContent;
    inputEl.focus();
  }

  function getEndpoint() {
    return endpointEl.value.trim().replace(/\/$/, '');
  }

  // Check connection on load and endpoint change
  async function checkStatus() {
    try {
      const res = await fetch(getEndpoint() + '/v1/models', {
        headers: { 'ngrok-skip-browser-warning': '1' }
      });
      if (res.ok) {
        const data = await res.json();
        statusDot.classList.add('online');
        statusText.textContent = 'online';
        // Populate model list
        if (data.data?.length) {
          modelSelect.innerHTML = data.data
            .filter(m => !m.id.includes('embed'))
            .map(m => `<option value="${m.id}">${m.id}</option>`)
            .join('');
        }
      } else {
        throw new Error();
      }
    } catch {
      statusDot.classList.remove('online');
      statusText.textContent = 'offline';
    }
  }

  endpointEl.addEventListener('change', checkStatus);
  checkStatus();

  function appendMessage(role, content) {
    emptyState?.remove();

    const wrap = document.createElement('div');
    wrap.className = 'message-wrap';

    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const meta = document.createElement('div');
    meta.className = 'message-meta';
    meta.textContent = role === 'user' ? 'you' : 'assistant';

    const body = document.createElement('div');
    body.className = 'message-body';

    if (role === 'assistant') {
      body.innerHTML = formatMarkdown(content);
    } else {
      body.textContent = content;
    }

    msg.appendChild(meta);
    msg.appendChild(body);
    wrap.appendChild(msg);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return body;
  }

  function showThinking() {
    emptyState?.remove();
    const wrap = document.createElement('div');
    wrap.className = 'message-wrap';
    wrap.id = 'thinking';

    const msg = document.createElement('div');
    msg.className = 'message assistant';

    const meta = document.createElement('div');
    meta.className = 'message-meta';
    meta.textContent = 'assistant';

    const body = document.createElement('div');
    body.className = 'thinking';
    body.innerHTML = `<span>thinking</span><div class="thinking-dots"><span></span><span></span><span></span></div>`;

    msg.appendChild(meta);
    msg.appendChild(body);
    wrap.appendChild(msg);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeThinking() {
    document.getElementById('thinking')?.remove();
  }

  function formatMarkdown(text) {
    return text
      .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/^\- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, s => `<ul>${s}</ul>`)
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<[huplc])(.+)$/gm, '$1')
      .replace(/\n/g, '<br>');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    appendMessage('user', text);
    history.push({ role: 'user', content: text });
    showThinking();

    try {
      const res = await fetch(getEndpoint() + '/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'ngrok-skip-browser-warning': '1'
        },
        body: JSON.stringify({
          model: modelSelect.value,
          messages: history,
          timeout: 120
        })
      });

      const data = await res.json();
      removeThinking();

      if (data.error) {
        appendMessage('assistant', `Error: ${data.error.message || JSON.stringify(data.error)}`);
      } else {
        const reply = data.choices[0].message.content;
        history.push({ role: 'assistant', content: reply });
        appendMessage('assistant', reply);
      }
    } catch (err) {
      removeThinking();
      const wrap = document.createElement('div');
      wrap.className = 'message-wrap';
      wrap.innerHTML = `<div class="message assistant"><div class="message-meta">error</div><div class="error-msg">Could not reach proxy at ${getEndpoint()}. Make sure ngrok and uvicorn are running.</div></div>`;
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
